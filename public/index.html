<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Casino - Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Social Casino Slots</h1>
        <div class="player-stats">
            <div class="stat-box" id="level-display">
                <span class="label">Level</span>
                <span class="value" id="current-level">1</span>
            </div>
            <div class="stat-box" id="balance-display">
                <span class="label">Coins</span>
                <span class="value" id="current-balance">1000</span>
            </div>
        </div>
    </header>

    <main>
        <div id="reel-container" class="reel-container">
            <div class="reel" id="reel-0">?</div>
            <div class="reel" id="reel-1">?</div>
            <div class="reel" id="reel-2">?</div>
        </div>

        <div class="controls">
            <div class="bet-control">
                <label for="bet-amount">Bet:</label>
                <input type="number" id="bet-amount" value="10" min="1" step="5">
            </div>
            <button id="spin-button" class="btn-spin">SPIN</button>
        </div>

        <div id="message-display" class="message-display">
            Good Luck!
        </div>
    </main>

    <footer>
        <p class="disclaimer">NO REAL MONEY REQUIRED. This is a social casino for entertainment purposes only.</p>
    </footer>

    <!-- Game Logic Scripts -->
    <!-- In a real production app, these would be bundled. 
         For this foundational step, app.js will contain the necessary logic or import it. -->
    <script src="app.js" type="module"></script>
</body>
</html>
